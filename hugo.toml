baseURL = "https://fabrizioulisse.it/"
languageCode = "it-it"
defaultContentLanguage = "it"
title = "Fabrizio Ulisse [un blog]"
theme = "hugo-kraft-masonry"

# Genera testo/colori coerenti col tema anche per gli URL (slug minuscoli)
disablePathToLower = false

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  description = "Un blog"
  author = "Fabrizio Ulisse"

  # Sezioni di contenuto considerate "post" per la homepage.
  mainSections = ["posts"]

  # Numero massimo di articoli mostrati nella griglia masonry della home.
  homepagePostLimit = 12

  # Mostra/nascondi la barra del filtro per categoria in homepage.
  enableCategoryFilter = true

  # Titolo e sottotitolo del hero in homepage.
  # "title" è opzionale: se omesso viene usato il "title" globale qui sopra.

  disableDescriptionMobile = true

  # Formato data visibile nei post — token Hugo locale-aware o layout Go personalizzato.
  # Token predefiniti: ":date_full", ":date_long" (default), ":date_medium", ":date_short".
  # Layout Go personalizzato, es. "02/01/2006" → 19/06/2026 (numerico, giorno prima).
  # I nomi di mese/giorno sono localizzati nella lingua della pagina.
  # dateFormat = ":date_long"

  # Social sharing — opzionale
  # ogImage       = "/img/og-default.png"  # immagine OG di fallback (homepage e post senza cover)
  # twitterHandle = "yourhandle"           # senza il simbolo @

  # GA4 measurement ID: il tag gtag.js viene iniettato solo in build di produzione.
  googleAnalytics = "G-Z3VHM8HR72"


  # EchoThread comments — optional; widget is not rendered if apiKey is absent
  [params.echothread]
    apiKey      = "zuxKJqoIt_3x3VVBNhj4_l8xHzpcOC4G-pOqX9cX-vY" 
    shortname   = "fabrizioulisse"
    theme       = "auto"          # auto | light | dark  (default: auto)
    accentColor = "#2f5d50"              # optional hex accent, e.g. "#2f5d50"

  [params.website_ld]
    search_url_template = "https://fabrizioulisse.it/?q={search_term_string}"

  [params.person_ld]
    person_name            = "Fabrizio Ulisse"
    person_family_name     = "Ulisse"
    person_given_name      = "Fabrizio"
    person_image           = "https://fabrizioulisse.it/img/fabrizio-ulisse.webp"
    person_telephone       = ""
    person_email           = "fabrizio.ulisse@gmail.com"
    person_url             = "https://fabrizioulisse.it/"
    person_knows_language  = ["it-IT", "en-US"]
    address_locality       = "Ravenna"
    address_region         = "Emilia-Romagna"
    address_country        = "IT"

  [params.footer]
    left  = "&copy; 2026 Fabrizio Ulisse"
    right = "Built with [Hugo](https://gohugo.io) &amp; [Kraft Masonry](https://github.com/biccio/hugo-kraft-masonry) theme"

  [params.hero]
    title = "Fabrizio Ulisse"
    subtitle = [
      "👋 **Ciao, sono Fabrizio!** Lavoro per semplificare e umanizzare complessità tecnologiche, amo pedalare [la mia bici gravel](https://ciclogravelista.com) e suonare la mia [Strato](https://www.youtube.com/watch?v=_505xUKLlAo), ma sono soprattutto un papà. <br> Questo è il mio blog, dove parlo di ciò che mi appassiona o mi incuriosisce."
      
    ]

[menus]
  [[menus.main]]
    name = "Post"
    url = "/posts/"
    weight = 10

  [[menus.main]]
    name = "temi"
    url = "/categories/"
    weight = 20

  [[menus.main]]
    name = "Tag"
    url = "/tags/"
    weight = 25

  [[menus.main]]
    name = "Chi sono"
    url = "/about/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Consente HTML grezzo (es. <figure>, <video>) nei contenuti markdown.
      unsafe = true
